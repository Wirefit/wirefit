# ct contract check — GitHub composite action (Phase 1, PRD 1.9).
#
# v0 status: runnable once the module is published; binary download from
# releases replaces `go install` when goreleaser is set up (PRD OSS scaffolding).
#
# Usage in a service repo:
#
#   on:
#     pull_request:
#     push: { branches: [main] }
#   jobs:
#     contracts:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - uses: Wirefit/wirefit/actions/check@v0
#           with:
#             contracts-repo: acme/contracts
#             token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
#             # java classpath/build-tool config goes on the wirefit-java command
#             # in contracts.yaml (extractors:), not here
name: wirefit contract check
description: Block PRs that break consumer contracts (schema-only, no pact files)

inputs:
  contracts-repo:
    description: owner/repo of the contracts repository
    required: true
  token:
    description: token with read (PRs) / write (main) access to the contracts repo
    required: true
  manifest:
    description: path to contracts.yaml
    default: contracts.yaml
  version:
    description: wirefit version to install (a module version like v0.3.0, or latest)
    default: latest

runs:
  using: composite
  steps:
    - name: Check out contracts repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.contracts-repo }}
        token: ${{ inputs.token }}
        path: .wirefit/contracts-repo

    - name: Install wirefit + external extractors
      shell: bash
      # TODO: pinned release binaries + checksums. wirefit-ts/wirefit-java are
      # the official Java/TS extractors; the manifest routes to them via
      # extractors:. Java classpath/build-tool config lives on the wirefit-java
      # command there, not on `wirefit extract`.
      run: |
        go install github.com/wirefit/wirefit/cmd/wirefit@${{ inputs.version }}
        go install github.com/wirefit/wirefit/cmd/wirefit-ts@${{ inputs.version }}
        go install github.com/wirefit/wirefit/cmd/wirefit-java@${{ inputs.version }}

    - name: Extract candidate IR
      shell: bash
      run: wirefit extract -f "${{ inputs.manifest }}"

    - name: Check (PR) or publish (main)
      shell: bash
      run: |
        wirefit check -f "${{ inputs.manifest }}" --contracts-repo .wirefit/contracts-repo --report .wirefit/report.md
        if [ "${{ github.event_name }}" = "push" ]; then
          wirefit publish -f "${{ inputs.manifest }}" --contracts-repo .wirefit/contracts-repo
        fi

    - name: Sticky PR comment
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- wirefit -->';
          let body = marker + '\n';
          try { body += fs.readFileSync('.wirefit/report.md', 'utf8'); }
          catch { body += '### wirefit contract check\n(no report produced — extraction failed?)'; }
          if (body.length > 65000) body = body.slice(0, 64900) + '\n… (truncated)\n```';
          const {data: comments} = await github.rest.issues.listComments({
            ...context.repo, issue_number: context.issue.number, per_page: 100});
          const prev = comments.find(c => c.body.startsWith(marker));
          if (prev) {
            await github.rest.issues.updateComment({...context.repo, comment_id: prev.id, body});
          } else {
            await github.rest.issues.createComment({...context.repo, issue_number: context.issue.number, body});
          }
